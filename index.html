<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Shelby Uploader</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin: 0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }
    h1 { font-size: 2.5em; margin-bottom: 10px; }
    p { font-size: 1.1em; opacity: 0.9; }
    input[type="file"] {
      margin: 25px 0;
      padding: 10px;
      background: white;
      color: black;
      border-radius: 8px;
    }
    button {
      padding: 15px 40px;
      font-size: 18px;
      background: #00d4ff;
      color: #222;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      margin: 15px;
    }
    button:hover { background: #00ffcc; transform: scale(1.05); }
    #status { margin: 25px 0; font-size: 1.2em; min-height: 30px; }
    #result {
      margin-top: 30px;
      padding: 25px;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      text-align: left;
      display: none;
    }
    .footer { margin-top: 50px; font-size: 0.9em; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 My Shelby Uploader</h1>
    <p><strong>Shelby Verifiable Global Storage</strong><br>
    Write once • Read anywhere • Cryptographic Proof</p>

    <input type="file" id="fileInput" accept="image/*,video/*,.pdf">
    <br>
    <button onclick="uploadFile()">Upload to Shelby</button>

    <div id="status"></div>
    <div id="result"></div>
  </div>

  <div class="footer">
    Built by Rokon • Shelby Early Access Developer • 2026
  </div>

  <script>
    async function uploadFile() {
      const file = document.getElementById('fileInput').files[0];
      const status = document.getElementById('status');
      const result = document.getElementById('result');

      if (!file) {
        alert("❌ Please select a file first!");
        return;
      }

      status.innerHTML = "⏳ Uploading to Shelby Network...";
      result.style.display = "none";

      // Demo mode (real e Shelby SDK boshabo)
      setTimeout(() => {
        status.innerHTML = "✅ Successfully uploaded to Shelby!";

        result.innerHTML = `
          <h3>Upload Details</h3>
          <p><strong>File:</strong> ${file.name}</p>
          <p><strong>Size:</strong> ${(file.size / (1024*1024)).toFixed(2)} MB</p>
          <p><strong>Type:</strong> ${file.type || 'Unknown'}</p>
          <p><strong>Status:</strong> Stored on Shelby Global Network</p>
          <p><strong>Feature:</strong> Cryptographic proof available on read</p>
          <hr>
          <p><strong>Note:</strong> This is demo mode.<br>
          Real upload + proof er jonno Shelby Early Access API key use korte hobe.</p>
          <p><a href="https://developers.shelby.xyz" target="_blank" style="color:#00ffcc;">Get Early Access →</a></p>
        `;
        result.style.display = "block";
      }, 1500);
    }
  </script>
</body>
</html>
