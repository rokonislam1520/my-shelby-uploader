<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Shelby Uploader - Verifiable Storage</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 40px 20px;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: white;
      min-height: 100vh;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      background: rgba(255,255,255,0.1);
      padding: 50px 40px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      backdrop-filter: blur(15px);
    }
    h1 { font-size: 2.8em; margin-bottom: 8px; }
    .subtitle { font-size: 1.25em; opacity: 0.9; margin-bottom: 40px; }
    input[type="file"] {
      width: 100%;
      padding: 18px;
      background: white;
      color: #222;
      border: none;
      border-radius: 12px;
      margin: 25px 0;
      font-size: 1.1em;
    }
    button {
      padding: 18px 60px;
      font-size: 1.25em;
      font-weight: bold;
      background: #00f5ff;
      color: #1a1a2e;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #00ffcc;
      transform: translateY(-4px);
    }
    #status {
      margin: 30px 0;
      font-size: 1.35em;
      font-weight: 600;
      min-height: 45px;
    }
    #result {
      display: none;
      margin-top: 30px;
      padding: 30px;
      background: rgba(255,255,255,0.18);
      border-radius: 16px;
      text-align: left;
      line-height: 1.7;
    }
    .footer {
      margin-top: 70px;
      text-align: center;
      font-size: 0.95em;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 My Shelby Uploader</h1>
    <p class="subtitle">Verifiable Global Hot Storage • Powered by Shelby (Aptos + Jump Crypto)</p>

    <input type="file" id="fileInput" accept="image/*,video/*,.pdf,.txt">
    <br>
    <button onclick="uploadFile()">Upload to Shelby Network</button>

    <div id="status"></div>
    <div id="result"></div>
  </div>

  <div class="footer">
    Built by Rokon • Shelby Early Access Developer • March 2026
  </div>

  <script>
    async function uploadFile() {
      const file = document.getElementById('fileInput').files[0];
      const status = document.getElementById('status');
      const result = document.getElementById('result');

      if (!file) {
        alert("❌ Please select a file first!");
        return;
      }

      status.textContent = "⏳ Uploading to Shelby Global Network...";
      result.style.display = "none";

      setTimeout(() => {
        status.innerHTML = "✅ Successfully stored on Shelby!";

        result.innerHTML = `
          <h3>📤 Upload Details</h3>
          <p><strong>File:</strong> ${file.name}</p>
          <p><strong>Size:</strong> ${(file.size / (1024*1024)).toFixed(2)} MB</p>
          <p><strong>Storage:</strong> Shelby Verifiable Hot Storage</p>
          <p><strong>Network:</strong> Single global namespace (Aptos powered)</p>
          <p><strong>Key Benefit:</strong> Cryptographic proof for every future read</p>
          <hr>
          <p><strong>Real Shelby Integration:</strong> Early Access API key + SDK needed for production upload.</p>
          <p><a href="https://developers.shelby.xyz" target="_blank">Join Early Access →</a></p>
        `;
        result.style.display = "block";
      }, 1600);
    }
  </script>
</body>
</html>
